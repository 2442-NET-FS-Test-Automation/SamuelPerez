<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Sign in</title>


    <style>
        .internal{
            color: green;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1 id="heading">City Library</h1>
        <nav class="site-nav">
            <a href="index.html">Catalog</a>
            <a href="login.html">Sign in</a>
        </nav>
    </header>

    <main>
        <form id="login-form" class="panel">
            <div class="panel">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="ada or bob">
            </div>
            <div class="panel">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>
            <button type="submit">Sign in</button>
            <p id="login-status"></p>
        </form>

        <fieldset>
            <legend>Membership preferences (inpu-type tour)</legend>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="ada@library.dev">
            </div>
            <div class="field">
                <label for="member-since">Member since</label>
                <input type="date" name="member-since" id="member-since">
            </div>

            <div class="field">
                <label for="loan-limit">Loan limit</label>
                <input type="number" name="loan-limit" id="loan-limit" min="1" max="10" value="3">
            </div>

            <div class="field">
                <label for="branch">Home branch</label>
                <select name="branch" id="branch">
                    <option>North</option>
                    <option>Central</option>
                    <option>South</option>
                </select>
            </div>

            <div class="field field-inline">
                <input type="checkbox" id="newsletter" name="newsletter" checked>
                <label for="newsletter">Email me the New Arrivals newsletter</label>
            </div>

            <div class="field field-inline">
                <input type="radio" id="format-print" name="format" value="print" checked>
                <label for="format">Print</label>
                <input type="radio" id="format-ebook" name="format" value="ebook">
                <label for="format-ebook">E-book</label>
            </div>
        </fieldset>

        <p style="color: red;">This tag is inline styled</p>
        <p class="internal">This tag is internally styled from the "head" section</p>

    </main>

    <footer>

    </footer>
</body>
</html>
