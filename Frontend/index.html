<!DOCTYPE html>
<html lang="en">
<head> <!--Comments-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librar Catalog</title>
</head>
<body>
    <header class="site-header">
        <h1 id="heading">City Library</h1>
        <nav class="site-nav">
            <a href="index.html">Catalog</a>
            <a href="login.html">Sign in</a>
        </nav>
    </header>
    <main>
        <section id="catalog">
            <h2>Catalog</h2>
            <div class="toolbar">
                <label for="search">Search:</label>
                <input type="search" id="search" name="search" placeholder="title or SKU">
                <span class="hint">try a SKU like BK-101</span>
            </div>
            
            <div class="cards" id="catalog-cards">
                <article class="card">
                    <h3>Clean Code</h3>
                    <dl>
                        <dt>SKU</dt><dd>BK-101</dd>
                        <dt>Price</dt><dd>29.99</dd>
                        <dt>In Stock</dt><dd>12</dd>
                    </dl>
                </article>

            </div>
        </section>
    </main>
    <footer class="site-footer">
        <p>City Library - frontend demo (Library domain from earlier)</p>
    </footer>
</body>
</html>
